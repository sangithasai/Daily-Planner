<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Daily Planner</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow-lg border-0 p-4 rounded-4 mx-auto" style="max-width: 450px;">

        <h2 class="text-center fw-bold mb-4">Welcome Back</h2>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="mb-3">
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Username"
                    required
                >
            </div>

            <div class="mb-3">
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Password"
                    required
                >
            </div>

            <button class="btn btn-success w-100 py-2 fw-bold">
                Login
            </button>

        </form>

        <p class="mt-4 text-center">
            Don’t have an account?
            <a href="/register">Register</a>
        </p>

    </div>

</div>

</body>
</html>

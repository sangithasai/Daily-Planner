<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2>Edit Task</h2>

        <form method="POST">
            <input type="text" name="task" class="form-control mb-3" value="{{ task[1] }}" required>
            <input type="time" name="time" class="form-control mb-3" value="{{ task[2] }}" required>

            <button class="btn btn-primary w-100">Update Task</button>
        </form>
    </div>
</div>

</body>
</html>
